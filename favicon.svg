<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Alephain · A · Geometric monogram</title>
  <!-- Brand-guide a-paper / a-slate, scaled ×1.6 so the A reaches
       both viewBox edges (top y=0, bottom y=64) with no surrounding
       whitespace. The horizontal "erase" bar inside the A flips with
       the theme so it reads as the paper / slate background colour
       and creates the canonical Alephain "H-cut A" mark. -->
  <style>
    .ink   { fill: #0F1115; }
    .erase { fill: #FAFAF7; }
    @media (prefers-color-scheme: dark) {
      .ink   { fill: #EDE9DD; }
      .erase { fill: #1A1F26; }
    }
  </style>
  <path class="ink" d="M32 0 L64 64 L55.2 64 L48.3 49.6 L15.7 49.6 L8.8 64 L0 64 Z"/>
  <rect class="erase" x="17" y="37" width="30" height="5"/>
</svg>
